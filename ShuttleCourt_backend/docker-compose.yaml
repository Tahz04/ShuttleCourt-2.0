version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: badminton_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: badminton_db
      MYSQL_USER: badminton_user
      MYSQL_PASSWORD: badminton_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  backend:
    build: .
    container_name: badminton_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_USER: badminton_user
      DB_PASSWORD: badminton_pass
      DB_NAME: badminton_db
      JWT_SECRET: your_super_secret_key_change_me
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mysql_data: